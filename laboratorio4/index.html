<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Equipos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
</head>

<body class="bg-light">
    <div class="container mt-5">
        <div class="row g-4">

    
            <div class="col-md-5" >
                <div class="card shadow">
                  <div class="card-header bg-dark text-white">
                    <h4>Registro de equipos</h4>
                  </div>
                    <div class="card-body">
                        <form id="formEquipo">

        
                            <div class="mb-3">
                                <label class="form-label">Código del Equipo</label>
                                <input type="text" class="form-control" id="codigo" placeholder="Ej: E001">
                                <small id="errorCodigo" class="text-danger"></small>
                            </div>

                            
                            <div class="mb-3">
                                <label class="form-label">Nombre del Dispositivo</label>
                                <input type="text" class="form-control" id="nombre" placeholder="Mínimo 5 caracteres">
                                <small id="errorNombre" class="text-danger"></small>
                            </div>

                          



                            <div class="mb-3">
                                <label class="form-label">Categoría</label>
                                <select class="form-select" id="categoria">
                                    <option value="">Seleccione una categoría...</option>
                                    <option value="Redes">Redes</option>
                                    <option value="Laptops">Laptops</option>
                                    <option value="Impresoras">Impresoras</option>
                                </select>
                                <small id="errorCategoria" class="text-danger"></small>
                            </div>

                           
                            <div class="mb-3">
                                <label class="form-label">Precio Unitario ($)</label>
                                <input type="number" class="form-control" id="precio" placeholder="Ej: 299.99" min="0" step="0.01">
                                <small id="errorPrecio" class="text-danger"></small>
                            </div>

                           
                            <button class="btn btn-success"> Registrar equipo </button>

                        </form>
                    </div>
                </div>
            </div>

           
            <div class="col-md-7">
                <div class="card shadow">

                    <div class="card-header d-flex justify-content-between align-items-center bg-dark text-white">
                        <h4 class="mb-0"> Todos los Equipos Registrados</h4>
                        <span class="badge bg-primary fs-6" id="contador">
                            0
                        </span>

                    </div>

                    <div class="card-body">
                        <div class="table-responsive">

                            <table class="table table-bordered table-striped ">
                                <thead class="table-dark">
                                    <tr>
                                        <th>#</th>
                                        <th>Código</th>
                                        <th>Nombre</th>
                                        <th>Categoría</th>
                                        <th>Precio</th>
                                    </tr>
                                </thead>
                                <tbody id="tablaEquipos">
                                  
                                </tbody>
                            </table>
                        </div>
                       
                            <button class="btn btn-danger" id="limpiarTabla">
                                 Limpiar Tabla
                            </button>
                        
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="scrip.js"></script>
</body>

</html>
